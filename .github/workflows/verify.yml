name: verify
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  verify:
    runs-on: ubuntu-24.04
    env:
      TZ: UTC
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      NO_COLOR: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: npm
      - name: Install
        run: npm ci
      - name: Verify
        run: npm test
